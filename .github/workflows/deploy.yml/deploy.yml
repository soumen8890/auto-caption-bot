name: 🚀 CI/CD — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/imdb-caption-bot

jobs:
  # ──────── Lint ────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install flake8 pylint
      - name: flake8
        run: flake8 . --max-line-length=120 --exclude=__pycache__

  # ──────── Build & Push Docker ────────
  docker:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────── Deploy to Render ────────
  deploy-render:
    name: 🌐 Deploy → Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # Set RENDER_DEPLOY_HOOK in GitHub Secrets:
        # Render dashboard → Service → Settings → Deploy Hook → copy URL

  # ──────── Deploy to Koyeb ────────
  deploy-koyeb:
    name: ☁️ Deploy → Koyeb
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Install Koyeb CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | bash
          echo "$HOME/.koyeb/bin" >> $GITHUB_PATH

      - name: Redeploy Koyeb service
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          koyeb service redeploy imdb-caption-bot/imdb-caption-bot
        # Set KOYEB_TOKEN in GitHub Secrets:
        # Koyeb dashboard → Account → API Credentials → create token
